<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display Window</title>
    <style>
      /* Fullscreen projector-friendly styling */
      html, body {
        height: 100%;
        margin: 0;
        background: #000; /* pure black */
        overflow: hidden; /* no scrollbars */
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        color: #f3ead9; /* cream-ish text */
        font-family: Georgia, 'Times New Roman', Times, serif;
      }

      .verse-area {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6vh 6vw;
        box-sizing: border-box;
      }

      .verse-content {
        max-width: 90vw;
        text-align: center;
        line-height: 1.2;
        transition: opacity 240ms ease;
        opacity: 0;
      }

      .verse-content.show {
        opacity: 1;
      }

      .reference {
        font-size: 1.2rem;
        opacity: 0.9;
        margin-bottom: 0.6rem;
      }

      .text {
        font-weight: 600;
      }

      /* prevent any selection or chrome */
      * { -webkit-user-select: none; -webkit-touch-callout: none; }
    </style>
  </head>
  <body>
    <main class="verse-area">Waiting for verse...</main>
    <script src="display.js"></script>
  </body>
</html>
