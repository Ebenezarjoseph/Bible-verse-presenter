<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control Window</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #111827;
        color: #f9fafb;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      .panel {
        width: min(720px, calc(100vw - 48px));
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      .buttons {
        display: flex;
        gap: 12px;
        margin: 20px 0;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 12px 18px;
        font-size: 15px;
        cursor: pointer;
        background: #60a5fa;
        color: #0f172a;
        font-weight: 700;
      }

      button.secondary {
        background: #e5e7eb;
      }

      .transcript-log {
        min-height: 220px;
        border-radius: 12px;
        border: 1px dashed #4b5563;
        background: #111827;
        padding: 16px;
        color: #d1d5db;
      }

      .status-line {
        margin: 10px 0 0;
        color: #93c5fd;
        font-size: 14px;
        min-height: 20px;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Control Window</h1>
      <p>Ready to start listening and send verses to the display.</p>
      <div class="buttons">
        <button id="startListening">Start Listening</button>
        <button id="showDisplay" class="secondary">Show Display</button>
      </div>
      <div id="speechStatus" class="status-line"></div>

      <div style="display:flex;gap:12px;margin-top:12px;align-items:center;">
        <input id="manualRef" placeholder="Type reference (e.g. John 3:16)" style="flex:1;padding:8px;border-radius:8px;border:1px solid #374151;background:#0f172a;color:#fff;" />
        <button id="goRef" class="secondary">Go</button>
      </div>

      <div style="margin-top:14px;padding:12px;border-radius:10px;background:#0b1220;border:1px solid #22303a;">
        <div style="font-weight:700;margin-bottom:8px">Settings</div>
        <div style="display:flex;gap:8px;align-items:center;">
          <label style="min-width:120px">Translation</label>
          <select id="translationSelect" style="flex:1;padding:8px;border-radius:6px;background:#0f172a;color:#fff;border:1px solid #374151"></select>
        </div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:8px;">
          <label style="min-width:120px">Display</label>
          <select id="displaySelect" style="flex:1;padding:8px;border-radius:6px;background:#0f172a;color:#fff;border:1px solid #374151"></select>
          <button id="moveFullscreen" class="secondary">Move + Fullscreen</button>
        </div>
      </div>

      <div style="display:flex;gap:12px;margin-top:12px;">
        <div style="flex:2">
          <div style="font-weight:700;margin-bottom:8px">Transcripts</div>
          <div id="transcriptLog" class="transcript-log" aria-live="polite"></div>
        </div>
        <div style="flex:1">
          <div style="font-weight:700;margin-bottom:8px">Verse History</div>
          <div id="verseHistory" style="min-height:220px;border-radius:12px;border:1px dashed #4b5563;padding:12px;background:#0b1220;overflow:auto;color:#d1d5db"></div>
        </div>
      </div>
    </main>
    <script type="module" src="control.js"></script>
  </body>
</html>
